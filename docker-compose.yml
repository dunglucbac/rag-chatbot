services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ingest.topic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./:/app
      - uploads:/app/storage/uploads
    command: npm run start:dev

  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ingest.topic}
      RABBITMQ_PDF_QUEUE: ${RABBITMQ_PDF_QUEUE:-ingest.pdf.queue}
      RABBITMQ_IMAGE_QUEUE: ${RABBITMQ_IMAGE_QUEUE:-ingest.image.queue}
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-10}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - uploads:/app/storage/uploads
    deploy:
      replicas: 2

volumes:
  uploads:
